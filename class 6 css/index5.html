<!DOCTYPE html>
<html>
    <head>
        <style>
            li:first-child {
                color: green;
            }

            li:last-child {
                color: red;
            }
            li:nth-child(even){
                background-color: orange;
            }
            li:nth-child(odd){
                background-color: rgb(195, 195, 222);
            }

        </style>
    </head>
    <body>
        <ul>
            <li>LG</li>
            <li>Samsung</li>
            <li>Apple</li>
            <li>Sony</li>
            <li>LG</li>
            <li>Samsung</li>
            <li>Apple</li>
            <li>Sony</li>

        </ul>
    </body>
</html>

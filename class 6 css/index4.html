<!DOCTYPE html>
<html>
<head>
    <style>
        a:link {
            color: orange; 
        }

        a:visited {
            color: green;
        }

        a:hover {
            color: red;
        }

        a:active {
            color: skyblue
        }
    </style>

</head>

<body>

    <nav>
        <a href="https://google.com" target="_blank">Google</a>
        <a href="https://youtube.com" target="_blank">Youtube</a>
        <a href="https://gmail.com" target="_blank">Gmail</a>
    </nav>
</body>

</html>

<!-- if we wanted to apply special state or style for the elements pseudo classes
 

Intro to pseudo-classes(

link: unvisited links (not clicked yet)


visited, already clicked

hover: when user hovers mouse over the element

active: styles the element when it is active (clicked on or activated)


-->

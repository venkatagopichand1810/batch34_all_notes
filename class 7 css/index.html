<!DOCTYPE html>
<html>
    <head>
        <style>
            p {
                border-style: double;
                border-width: 10px;
                border-width: medium;
                border-width: thick;
                border-color: green;
                border-color: #ffadff;
                border-color: hsl(0, 0%, 0%); 
                border: 2px double orange;
                border: 1px solid red;
                border-top: 1px solid orange;
                border-right: 10px double red;
                border-bottom: 2px dotted blue;
                border-left: 2px solid green;
                border-radius: 20px;

                border-color: green orange pink violet;
                border-width: 5px 10px 15px 20px;
                border-style: solid dotted dashed double;

                /* 
                top
                right
                bottom
                left
                
                */
            }
            
        </style>
   
    </head>
    <body>
        <p style="border-style: dashed;">This is paragraph</p>
        <p style = "border-style: dotted;">This is another paragraph</p>
        <p style = "border-style: solid;">This is another paragraph</p>
        <p style = "border-style: double;">This is another paragraph</p>
        <p style = "border-style: ridge;">This is another paragraph</p>
        <p>
            this is paragraph
        </p>

    </body>
</html>


<!-- border: line drawn around an element 
 
border-style
border-width
border-color

short hand notation for the border: width style color

-->

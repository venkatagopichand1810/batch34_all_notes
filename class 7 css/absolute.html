<!DOCTYPE html>
<html>
    <head>
        <style>
            .absolute-box{
                position: absolute;
                top: 50px;
                left: 50px;
                width: 200px;
                height: 100px;
                background-color: lightblue;
                border: 4px solid green;
            }

            .relative-box {
                position: relative;
                top: 500px;
                left: 100px;
                width: 300px;
                height: 200px;
                background-color: lightgray;
                border: 2px solid orange;
            }

        </style>
    </head>
    <body>
         <!-- <div class = "absolute-box">Some text</div>  -->
        <div class = "relative-box">
            Relative
           <div class = "absolute-box">Absolute</div> 
        </div>
    </body>
</html>

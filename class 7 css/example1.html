<!doctype html>
<html>

<head>
    <style>
        nav {
            background-color: rgb(10, 10, 10);
        }

        nav li {
            list-style: none;
            display: inline-block;
            padding: 10px;

        }

        nav a {
            text-decoration: none;
            color: rgb(245, 229, 6);
            font-size: 20px;
            padding: 10px;
        }

        nav a:hover {
            background: linear-gradient(to right, rgb(245, 229, 6), rgb(10, 10, 10), orange);
        }

        .btn {
            background: linear-gradient(to right, red, green, orange, blue);
            font-size: 20px;
            padding: 10px;
        }
    </style>

</head>

<body>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>

        </ul>


    </nav>
    <button class="btn">Submit</button>
</body>

</html>

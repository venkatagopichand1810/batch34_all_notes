             .item {
                position: relative;
                border: 2px solid red;
                width: 50px;
                height: 20px;
                margin: 5px;
                top: 10px;
                left: 10px;
            }
        </style>

    </head>
    <body>
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
        <div class="item">Item 4</div>
    </body>
</html>


 <!-- position property helps how the element is positioned in the document 
  
static: default value. elements are not positioned.
static is the defult position property and it will always be in the normal flow of the document.
top, right, bottom and left properties will not work.

relative: the element is positioned relative to its normal position,
top right bottom and left will apply 


abosolute: element will be removed from the normal position 
and it will be positioned relative to the nearest positioned ancestor(relative).
if there is no positioned ancestor, it will be positioned relative to the html document.
 
fixed: element will be removed from the normal position and it will be positioned relative to the browser window.

sticky: element will be removed from the normal position and it will be positioned relative to the browser window.
 
 
 
 -->

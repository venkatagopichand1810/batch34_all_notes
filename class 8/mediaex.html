<!DOCTYPE html>
<html>

<head>
    <style>
        .navbar {
            background-color: #333;
            color: white;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            flex-direction: row;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
        }

         @media (max-width: 300px) {
            .navbar {
                flex-direction: column;
                align-items: center;
            }
            .nav-links {
                flex-direction: column;
                text-align: center;
                gap: 10px
            }
        } 
    </style>

</head>

<body>
    <div class="navbar">
        <h2>GUVI PORTAL</h2>
        <div class="nav-links">
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Contact</a>
        </div>
    </div>
</body>

</html>

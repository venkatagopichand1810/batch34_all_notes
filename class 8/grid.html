<!DOCTYPE html>
<html>

<head>
    <style>
        .grid-container {
            display: grid;
            background-color: skyblue;
            border: 2px solid black;
            gap: 20px;
            padding: 10px;
            /* grid-template-columns: 100px 200px 300px 1fr; */
            grid-template-columns: 150px 150px; 
            grid-template-rows: 150px 150px;
            justify-content: center;
            justify-content: end;
            justify-content: start;

        }
        .grid-container div {
            background-color: rgb(30, 27, 21);
            padding: 20px;
            text-align: center;
            color: white;
        }

    </style>
</head>

<body>
    <div class="grid-container">
        <div>ITEM 1</div>
        <div>ITEM 2</div>
    </div>

</body>

</html>

<!-- 
flex: one dimentional
grid: two dim...we can both rows and columns

grid is used to create the responsive websites
